/* =========================================================
   恒微足道 - 移动端APP样式
   茶色背景 + 金色点缀 + 移动端优化
   ========================================================= */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0704;
  --card-bg:   #1a0e08;
  --card-bd:   #3d2410;
  --gold:      #c9a84c;
  --gold-lt:   #d4b86a;
  --gold-dk:   #a08030;
  --gold-bg:   #c9a84c18;
  --gold-bg2:  #c9a84c10;
  --red:       #e05050;
  --text:      #f0e6d3;
  --text-dim:  #8a7560;
  --text-mute: #5a4535;
  --radius:    12px;
  --radius-sm: 8px;
}

html { font-size: 15px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}

/* ── SCROLLBAR ─────────────────────────────────────────── */
::-webkit-scrollbar { width: 0; }

/* ── APP SHELL ─────────────────────────────────────────── */
#app { min-height: 100vh; padding-bottom: 70px; }

/* ── NAV BAR ────────────────────────────────────────────── */
.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex; background: var(--card-bg);
  border-top: 1px solid var(--card-bd);
  backdrop-filter: blur(10px);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 8px 0 6px; cursor: pointer; color: var(--text-dim);
  font-size: 10px; gap: 2px; transition: color .2s; user-select: none;
}
.nav-item.active { color: var(--gold); }
.nav-item-icon { font-size: 22px; line-height: 1; }

/* ── PAGE HEADER ────────────────────────────────────────── */
.page-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: var(--card-bg);
  border-bottom: 1px solid var(--card-bd);
  position: sticky; top: 0; z-index: 50;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--gold-bg); border: 1px solid var(--gold-dk);
  color: var(--gold); font-size: 22px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0; flex-shrink: 0;
}
.page-title { font-size: 17px; font-weight: 600; color: var(--text); }

/* ── BANNER ─────────────────────────────────────────────── */
.banner {
  background: linear-gradient(160deg, #1a0e08 0%, #2d1508 50%, #1a0e08 100%);
  padding: 40px 20px 28px; text-align: center;
  border-bottom: 1px solid var(--card-bd);
}
.banner-logo {
  height: 56px; margin: 0 auto 10px; display: block;
  filter: drop-shadow(0 0 12px rgba(201,168,76,.4));
}
.banner-slogan {
  font-size: 16px; color: var(--gold); letter-spacing: 2px;
  font-weight: 500; margin-bottom: 6px;
}
.banner-hours {
  font-size: 12px; color: var(--text-dim);
}

/* ── QUICK GRID ─────────────────────────────────────────── */
.quick-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--card-bd);
  margin: 0;
}
.quick-item {
  background: var(--card-bg); display: flex; flex-direction: column;
  align-items: center; padding: 18px 8px; cursor: pointer;
  transition: background .15s;
}
.quick-item:active { background: var(--gold-bg); }
.quick-icon { font-size: 26px; margin-bottom: 6px; }
.quick-label { font-size: 12px; color: var(--text); }

/* ── SECTIONS ───────────────────────────────────────────── */
.section { padding: 16px; }
.section-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.section-title { font-size: 16px; font-weight: 600; color: var(--text); }
.section-more { font-size: 13px; color: var(--gold); cursor: pointer; }
.section-sub { font-size: 12px; color: var(--text-dim); margin-left: 8px; }

/* ── SERVICE CARDS ──────────────────────────────────────── */
.service-list { display: flex; flex-direction: column; gap: 10px; }
.service-card {
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius); overflow: hidden; cursor: pointer;
  transition: border-color .2s;
}
.service-card:active { border-color: var(--gold-dk); }
.svc-img {
  height: 80px; display: flex; align-items: center; justify-content: center;
  position: relative; flex-shrink: 0;
}
.svc-emoji { font-size: 40px; }
.svc-tag {
  position: absolute; top: 6px; right: 6px;
  background: var(--gold); color: #0d0704; font-size: 10px;
  padding: 2px 6px; border-radius: 4px; font-weight: 600;
}
.svc-info { padding: 10px 12px; }
.svc-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.svc-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
.svc-price { font-size: 17px; color: var(--gold); font-weight: 700; }

/* ── STORE CARDS ────────────────────────────────────────── */
.store-preview-list { display: flex; flex-direction: column; gap: 8px; }
.store-row {
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius-sm); padding: 12px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: border-color .15s;
}
.store-row:active { border-color: var(--gold-dk); }
.store-row-left { flex: 1; min-width: 0; }
.store-row-name {
  font-size: 14px; font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
}
.store-row-addr { font-size: 12px; color: var(--text-dim); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.store-row-hours { font-size: 11px; color: var(--text-mute); }

/* ── BADGES ─────────────────────────────────────────────── */
.badge-gold {
  display: inline-block; background: var(--gold); color: #0d0704;
  font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 700;
}
.badge-gold-sm {
  display: inline-block; background: var(--gold-bg); color: var(--gold);
  border: 1px solid var(--gold-dk); font-size: 10px; padding: 1px 6px;
  border-radius: 4px;
}
.badge-red {
  display: inline-block; background: #c94040; color: #fff;
  font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600;
}

/* ── NOTICES ───────────────────────────────────────────── */
.notice-list { display: flex; flex-direction: column; gap: 8px; }
.notice-row {
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius-sm); padding: 10px 12px;
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.notice-text { font-size: 13px; color: var(--text); flex: 1; }

/* ── FREE ITEMS ─────────────────────────────────────────── */
.free-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--card-bd); border-radius: var(--radius-sm); overflow: hidden;
}
.free-item {
  background: var(--card-bg); display: flex; flex-direction: column;
  align-items: center; padding: 14px 8px; gap: 6px;
}
.free-icon { font-size: 24px; }
.free-name { font-size: 12px; color: var(--text-dim); }

/* ── BUTTONS ────────────────────────────────────────────── */
.btn-gold-sm {
  background: var(--gold); color: #0d0704; border: none;
  font-size: 12px; font-weight: 700; padding: 5px 12px;
  border-radius: 20px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.btn-gold-sm:active { opacity: .8; }
.btn-gold-full {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dk) 100%);
  color: #0d0704; border: none; font-size: 16px; font-weight: 700;
  width: 100%; padding: 14px; border-radius: 30px; cursor: pointer;
  letter-spacing: 1px;
}
.btn-gold-full:active { opacity: .85; }
.btn-outline {
  background: transparent; border: 1px solid var(--gold-dk);
  color: var(--gold); font-size: 13px; padding: 8px 16px;
  border-radius: 20px; cursor: pointer; width: 100%;
}
.btn-outline:active { background: var(--gold-bg); }

/* ── SEARCH BAR ─────────────────────────────────────────── */
.search-bar { padding: 12px 16px; background: var(--card-bg); border-bottom: 1px solid var(--card-bd); }
.search-input {
  width: 100%; background: var(--bg); border: 1px solid var(--card-bd);
  border-radius: 24px; padding: 9px 16px; font-size: 14px;
  color: var(--text); outline: none;
}
.search-input::placeholder { color: var(--text-mute); }
.search-input:focus { border-color: var(--gold-dk); }

/* ── STORE LIST ─────────────────────────────────────────── */
.store-card {
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius); margin: 12px 16px; padding: 14px;
  cursor: pointer; transition: border-color .15s;
}
.store-card:active { border-color: var(--gold-dk); }
.store-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.store-card-name { font-size: 15px; font-weight: 600; color: var(--text); }
.store-card-hours { font-size: 12px; color: var(--gold); }
.store-card-addr { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.store-card-bot { display: flex; align-items: center; justify-content: space-between; }
.store-card-phone { font-size: 12px; color: var(--text-dim); }

/* ── STORE DETAIL ────────────────────────────────────────── */
.store-detail-hero { padding: 24px 16px; background: linear-gradient(160deg,#1a0e08,#2d1508); border-bottom: 1px solid var(--card-bd); }
.store-hero-name { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
.store-hero-type { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
.store-hero-info { display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: var(--text-dim); }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.mt16 { margin-top: 16px; }

/* ── TECH MINI LIST ─────────────────────────────────────── */
.tech-mini-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
.tech-mini {
  flex-shrink: 0; width: 70px; text-align: center; cursor: pointer;
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius-sm); padding: 10px 6px;
}
.tech-mini-avatar { font-size: 32px; margin-bottom: 4px; }
.tech-mini-name { font-size: 12px; color: var(--text); font-weight: 600; }
.tech-mini-level { font-size: 10px; color: var(--gold); margin-top: 2px; }

/* ── TECH FULL LIST ──────────────────────────────────────── */
.tech-full-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.tech-full-item {
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius); padding: 14px; display: flex; align-items: flex-start;
  gap: 12px; cursor: pointer; transition: border-color .15s;
}
.tech-full-item:active { border-color: var(--gold-dk); }
.tech-full-left { position: relative; flex-shrink: 0; }
.tech-avatar-lg { font-size: 40px; }
.avail-dot {
  width: 10px; height: 10px; background: #4caf50; border-radius: 50%;
  position: absolute; bottom: 0; right: 0; border: 2px solid var(--card-bg);
}
.unavail-dot {
  width: 10px; height: 10px; background: #555; border-radius: 50%;
  position: absolute; bottom: 0; right: 0; border: 2px solid var(--card-bg);
}
.tech-full-info { flex: 1; min-width: 0; }
.tech-full-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.tech-code { font-size: 11px; color: var(--text-dim); font-weight: 400; }
.tech-full-level { font-size: 12px; color: var(--gold); margin-bottom: 3px; }
.tech-full-spec { font-size: 12px; color: var(--text-dim); margin-bottom: 3px; }
.tech-full-meta { font-size: 11px; color: var(--text-mute); margin-bottom: 4px; }
.tech-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tech-tag {
  background: var(--gold-bg2); color: var(--gold); border: 1px solid var(--gold-dk);
  font-size: 10px; padding: 1px 7px; border-radius: 10px;
}
.tech-full-right { flex-shrink: 0; align-self: center; }
.offline-tip { font-size: 12px; color: var(--text-mute); }

/* ── TECH DETAIL ────────────────────────────────────────── */
.tech-detail-hero {
  text-align: center; padding: 30px 16px 20px;
  background: linear-gradient(160deg,#1a0e08,#2d1508);
  border-bottom: 1px solid var(--card-bd);
}
.tech-detail-avatar { font-size: 64px; margin-bottom: 10px; }
.tech-detail-name { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.tech-detail-code { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
.tech-detail-level { font-size: 14px; color: var(--gold); margin-bottom: 8px; }
.tech-detail-badges { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.tech-tag-lg {
  background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-dk);
  font-size: 12px; padding: 3px 12px; border-radius: 12px;
}
.tech-intro { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-top: 8px; }

/* ── INFO GRID ───────────────────────────────────────────── */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--card-bd); border-radius: var(--radius-sm); overflow: hidden; }
.info-item { background: var(--card-bg); padding: 12px; }
.info-label { font-size: 11px; color: var(--text-mute); margin-bottom: 4px; }
.info-val { font-size: 14px; color: var(--text); }

/* ── CERTS ──────────────────────────────────────────────── */
.cert-list { display: flex; flex-wrap: wrap; gap: 6px; }
.cert-badge {
  background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-dk);
  font-size: 12px; padding: 4px 10px; border-radius: 20px;
}
.page-bottom-btn { padding: 16px; }

/* ── SERVICE DETAIL ─────────────────────────────────────── */
.svc-detail-hero {
  text-align: center; padding: 30px 16px 20px;
  background: linear-gradient(160deg,#1a0e08,#2d1508);
  border-bottom: 1px solid var(--card-bd);
}
.svc-emoji-xl { font-size: 64px; display: block; margin-bottom: 10px; }
.svc-detail-name { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
.svc-detail-price { font-size: 28px; color: var(--gold); font-weight: 700; margin-bottom: 4px; }
.svc-detail-meta { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
.svc-detail-desc { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
.svc-detail-footer { padding: 16px; }

/* ── STEPS ───────────────────────────────────────────────── */
.steps-list { display: flex; flex-direction: column; gap: 8px; }
.step-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--gold-bg); border: 1px solid var(--gold-dk);
  color: var(--gold); font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ── SVC LIST SM ─────────────────────────────────────────── */
.svc-list-sm { display: flex; flex-direction: column; gap: 1px; background: var(--card-bd); border-radius: var(--radius-sm); overflow: hidden; }
.svc-sm-item {
  background: var(--card-bg); padding: 10px 12px;
  display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); cursor: pointer;
}
.svc-sm-item:active { background: var(--gold-bg2); }
.svc-sm-name { flex: 1; }
.svc-sm-price { color: var(--gold); font-weight: 600; }

/* ── SVC FULL LIST ───────────────────────────────────────── */
.svc-full-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.svc-full-item {
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius); padding: 14px; display: flex;
  align-items: center; gap: 12px; cursor: pointer; transition: border-color .15s;
}
.svc-full-item:active { border-color: var(--gold-dk); }
.svc-full-left { flex-shrink: 0; }
.svc-emoji-lg { font-size: 36px; }
.svc-full-info { flex: 1; min-width: 0; }
.svc-full-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.svc-full-desc { font-size: 12px; color: var(--text-dim); margin-bottom: 3px; }
.svc-full-meta { font-size: 11px; color: var(--text-mute); margin-bottom: 4px; }
.svc-full-price { font-size: 18px; color: var(--gold); font-weight: 700; flex-shrink: 0; }

/* ── BOOKING ─────────────────────────────────────────────── */
.booking-form { padding: 16px; }
.form-section { margin-bottom: 20px; }
.form-label { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.form-select {
  width: 100%; background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px;
  color: var(--text); outline: none; cursor: pointer;
  -webkit-appearance: none; appearance: none;
}
.form-select:focus { border-color: var(--gold-dk); }
.form-input {
  width: 100%; background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px;
  color: var(--text); outline: none;
}
.form-input::placeholder { color: var(--text-mute); }
.form-input:focus { border-color: var(--gold-dk); }
.form-textarea {
  width: 100%; background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px;
  color: var(--text); outline: none; resize: vertical; min-height: 80px;
}
.form-textarea::placeholder { color: var(--text-mute); }
.form-textarea:focus { border-color: var(--gold-dk); }

/* ── SVC SELECT ──────────────────────────────────────────── */
.svc-select-list { display: flex; flex-direction: column; gap: 8px; }
.svc-select-item {
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius-sm); padding: 12px; display: flex;
  align-items: center; gap: 10px; cursor: pointer; transition: all .15s;
}
.svc-select-item.selected { border-color: var(--gold); background: var(--gold-bg2); }
.svc-select-info { flex: 1; min-width: 0; }
.svc-select-name { font-size: 14px; font-weight: 600; color: var(--text); }
.svc-select-meta { font-size: 12px; color: var(--text-dim); }
.svc-select-right { text-align: right; }
.svc-select-price { font-size: 16px; color: var(--gold); font-weight: 700; }
.svc-select-tag { font-size: 10px; color: var(--gold); margin-top: 2px; }

/* ── DATE CHIPS ──────────────────────────────────────────── */
.date-scroll {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
}
.date-chip {
  flex-shrink: 0; text-align: center; padding: 8px 12px;
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius-sm); cursor: pointer; min-width: 52px;
  transition: all .15s;
}
.date-chip.today .date-chip-week { color: var(--gold); }
.date-chip.selected { border-color: var(--gold); background: var(--gold-bg2); }
.date-chip-week { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
.date-chip-day { font-size: 16px; font-weight: 700; color: var(--text); }
.date-chip.selected .date-chip-day { color: var(--gold); }

/* ── TECH BADGE ──────────────────────────────────────────── */
.bk-tech-badge {
  display: flex; align-items: center; gap: 8px;
  background: var(--gold-bg); border: 1px solid var(--gold-dk);
  border-radius: var(--radius-sm); padding: 10px 12px;
  font-size: 14px; color: var(--gold);
}
.bk-tech-badge-tag {
  background: var(--gold); color: #0d0704; font-size: 10px;
  padding: 1px 6px; border-radius: 4px; font-weight: 700; margin-left: auto;
}

/* ── BOOKING SUMMARY ────────────────────────────────────── */
.booking-summary {
  background: var(--card-bg); border: 1px solid var(--gold-dk);
  border-radius: var(--radius); padding: 14px; margin: 16px 0;
}
.summary-title { font-size: 14px; font-weight: 600; color: var(--gold); margin-bottom: 10px; }
.summary-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--card-bd); }
.summary-row:last-child { border-bottom: none; }
.summary-row span:first-child { color: var(--text-dim); }
.summary-row span:last-child { color: var(--text); }
.booking-note { font-size: 11px; color: var(--text-mute); text-align: center; margin-top: 8px; }

/* ── BOOKING RESULT ──────────────────────────────────────── */
.page-result { padding: 24px 16px; }
.result-hero { text-align: center; padding: 30px 0 20px; }
.result-icon { font-size: 56px; margin-bottom: 12px; }
.result-title { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--text-dim); }
.result-card {
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius); padding: 14px; margin-bottom: 16px;
}
.result-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--card-bd); }
.result-row:last-child { border-bottom: none; }
.result-row span:first-child { color: var(--text-dim); }
.result-row span:last-child { color: var(--text); }
.result-tip {
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius); padding: 14px; font-size: 13px;
  color: var(--text-dim); line-height: 1.8;
}
.result-tip-title { color: var(--gold); font-weight: 600; margin-bottom: 6px; }

/* ── MEMBER ──────────────────────────────────────────────── */
.member-header { padding: 16px; }
.member-card {
  background: linear-gradient(160deg,#3d2010,#5a3015,#3d2010);
  border: 1px solid var(--gold-dk); border-radius: var(--radius);
  padding: 20px 18px;
}
.member-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.member-avatar { font-size: 44px; }
.member-nickname { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.member-level { font-size: 12px; color: var(--gold); background: var(--gold-bg); border: 1px solid var(--gold-dk); display: inline-block; padding: 2px 8px; border-radius: 10px; }
.member-card-mid { display: flex; justify-content: space-around; margin-bottom: 12px; }
.member-stat { text-align: center; }
.member-stat-val { font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 2px; }
.member-stat-label { font-size: 11px; color: var(--text-dim); }
.member-stat-div { width: 1px; background: var(--card-bd); }
.member-card-no { font-size: 12px; color: var(--text-mute); text-align: center; }

/* ── RECHARGE ─────────────────────────────────────────────── */
.recharge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.recharge-item {
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: var(--radius-sm); padding: 14px 12px;
  cursor: pointer; transition: all .15s; position: relative;
}
.recharge-item.selected { border-color: var(--gold); background: var(--gold-bg2); }
.recharge-item.hot { border-color: var(--gold-dk); }
.recharge-tier { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
.recharge-amount { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.recharge-gift { font-size: 12px; color: var(--red); margin-bottom: 3px; }
.recharge-desc { font-size: 11px; color: var(--text-mute); }
.recharge-hot-badge {
  position: absolute; top: -1px; right: -1px;
  background: var(--gold); color: #0d0704; font-size: 10px;
  padding: 2px 6px; border-radius: 0 var(--radius-sm) 0 var(--radius-sm);
  font-weight: 700;
}

/* ── RECORDS ─────────────────────────────────────────────── */
.record-list { display: flex; flex-direction: column; gap: 1px; background: var(--card-bd); border-radius: var(--radius-sm); overflow: hidden; }
.record-item {
  background: var(--card-bg); padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.record-left { flex: 1; }
.record-name { font-size: 13px; color: var(--text); margin-bottom: 2px; }
.record-store { color: var(--text-dim); font-size: 12px; }
.record-date { font-size: 11px; color: var(--text-mute); }
.record-amount { font-size: 15px; font-weight: 700; }
.record-amount.out { color: var(--text-dim); }
.record-amount.in { color: #4caf50; }

/* ── BENEFITS ────────────────────────────────────────────── */
.benefit-list { display: flex; flex-direction: column; gap: 1px; background: var(--card-bd); border-radius: var(--radius-sm); overflow: hidden; }
.benefit-item { background: var(--card-bg); padding: 14px; }
.benefit-title { font-size: 14px; font-weight: 600; color: var(--gold); margin-bottom: 4px; }
.benefit-desc { font-size: 12px; color: var(--text-dim); }

/* ── EMPTY ───────────────────────────────────────────────── */
.empty-tip { text-align: center; padding: 40px; color: var(--text-mute); font-size: 14px; }

/* ── TOAST ───────────────────────────────────────────────── */
.toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,.85); color: var(--text); font-size: 14px;
  padding: 12px 24px; border-radius: 8px; z-index: 9999;
  pointer-events: none; text-align: center; max-width: 80%;
}

/* ── OFFLINE NOTICE ──────────────────────────────────────── */
.offline-notice { text-align: center; font-size: 14px; color: var(--text-mute); padding: 14px; background: var(--card-bg); border: 1px solid var(--card-bd); border-radius: 30px; }

/* ── PAGE SERVICES (full page) ───────────────────────────── */
.page-services .svc-full-list,
.page-techs .tech-full-list,
.page-stores #storesList { padding-top: 0; }
.page-services { min-height: 100vh; }

// app.js - 恒微足道 mobile APP
// SPA with hash-based routing, loads from data.json

const { stores, technicians, serviceGroups } = window.__APP_DATA__;

const LINXIA_STORES = ['临夏中天健店', '临夏义乌店'];
const NANGUAN_STORES = ['南关总店', '安宁刘家堡店'];
const XINQU_STORES = ['新区店'];
const LINTAO_STORES = ['临洮店'];

function getServicesByStoreName(name) {
  if (LINXIA_STORES.some(s => name.includes(s.split('临夏')[1] ? name.includes(s) : false))) {
    if (name.includes('临夏中天健') || name.includes('临夏义乌')) return serviceGroups.LINXIA;
  }
  if (name.includes('南关总店') || name.includes('安宁刘家堡')) return serviceGroups.NANGUAN;
  if (name.includes('新区')) return serviceGroups.XINQU;
  if (name.includes('临洮')) return serviceGroups.LINTAO;
  return serviceGroups.COMMON;
}

// Route registry
const routes = {};
let currentPage = '';
let historyStack = [];

function route(path, handler) { routes[path] = handler; }

function navigate(path, addToHistory = true) {
  if (addToHistory && currentPage) historyStack.push(currentPage);
  currentPage = path;
  window.location.hash = path;
  render();
}

function goBack() {
  if (historyStack.length > 0) {
    currentPage = historyStack.pop();
    window.location.hash = currentPage;
    render();
  } else {
    navigate('home');
  }
}

function render() {
  const hash = window.location.hash.slice(1) || 'home';
  const [path, query] = hash.split('?');
  const params = {};
  if (query) query.split('&').forEach(kv => { const [k,v]=kv.split('='); params[k]=v; });
  const handler = routes[path] || routes['home'];
  const container = document.getElementById('app');
  handler(container, params);
  window.scrollTo(0, 0);
}

// ─── STORES ────────────────────────────────────────────
function getStoreNameFromId(id) {
  const s = stores.find(s => s.id == id);
  return s ? s.name : '未知门店';
}

route('booking', (el, params) => {
  const storeId = parseInt(window.__storeId || params.storeId);
  const techId = parseInt(window.__techId || params.techId);
  const preselectedSvc = window.__bookingSvc;
  
  const defaultStoreId = storeId || stores[0].id;
  const store = stores.find(s => s.id === defaultStoreId) || stores[0];
  const svcList = getServicesByStoreName(store.name);
  const preselected = preselectedSvc || (svcList[0] ? svcList[0] : null);
  
  // Generate dates (today + 7 days)
  const dates = [];
  const now = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + i);
    const day = d.getDay();
    const weekNames = ['周日','周一','周二','周三','周四','周五','周六'];
    dates.push({
      date: d.toISOString().split('T')[0],
      day: d.getDate(),
      week: weekNames[day],
      today: i === 0
    });
  }
  
  // Time slots 12:00 - 04:30 every 30min
  const timeSlots = [];
  for (let h = 12; h <= 27; h++) {
    const realH = h % 24;
    timeSlots.push(`${String(realH).padStart(2,'0')}:00`);
    timeSlots.push(`${String(realH).padStart(2,'0')}:30`);
  }
  timeSlots.pop(); // remove last :30 (would be 28:30)
  
  window.__bookingState = {
    storeId: defaultStoreId,
    storeName: store.name,
    svc: preselected,
    date: dates[0].date,
    time: '20:00',
    techId: techId || null,
    contactName: '',
    contactPhone: ''
  };
  
  const selectedTech = techId ? technicians.find(t => t.id === techId) : null;
  
  el.innerHTML = `
    <div class="page-booking">
      <div class="page-hd">
        <button class="back-btn" onclick="goBack()">‹</button>
        <div class="page-title">预约服务</div>
        <div style="width:40px"></div>
      </div>
      <div class="booking-form">
        <div class="form-section">
          <div class="form-label">选择门店</div>
          <select class="form-select" id="bk-store" onchange="onBkStoreChange(this.value)">
            ${stores.map(s => `<option value="${s.id}" ${s.id===defaultStoreId?'selected':''}>${s.name}</option>`).join('')}
          </select>
        </div>
        ${selectedTech ? `
        <div class="form-section">
          <div class="form-label">指定技师</div>
          <div class="bk-tech-badge">
            <span>${selectedTech.avatar}</span>
            <span>${selectedTech.name}</span>
            <span class="bk-tech-badge-tag">已选</span>
          </div>
        </div>` : ''}
        <div class="form-section">
          <div class="form-label">选择服务</div>
          <div class="svc-select-list" id="svcList">
            ${svcList.map(sv => `
            <div class="svc-select-item ${preselected && sv.id===preselected.id?'selected':''}" onclick="selectSvc(${sv.id})">
              <span class="svc-emoji">${sv.emoji}</span>
              <div class="svc-select-info">
                <div class="svc-select-name">${sv.name}</div>
                <div class="svc-select-meta">${sv.duration}分钟</div>
              </div>
              <div class="svc-select-right">
                <div class="svc-select-price">¥${sv.price}</div>
                ${sv.tag ? `<div class="svc-select-tag">${sv.tag}</div>` : ''}
              </div>
            </div>`).join('')}
          </div>
        </div>
        <div class="form-section">
          <div class="form-label">选择日期</div>
          <div class="date-scroll">
            ${dates.map((d,i) => `
            <div class="date-chip ${d.today?'today':''} ${window.__bookingState.date===d.date?'selected':''}" onclick="selectDate('${d.date}',this)" data-date="${d.date}">
              <div class="date-chip-week">${d.week}</div>
              <div class="date-chip-day">${d.day}</div>

          </div>
        </div>
        <div class="form-section">
          <div class="form-label">到店时间</div>
          <select class="form-select" id="bk-time" onchange="onBkTimeChange(this.value)">
            ${timeSlots.map(t => `<option value="${t}" ${t==='20:00'?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-section">
          <div class="form-label">预约人信息</div>

        </div>
        <div class="form-section">
          <div class="form-label">备注（可选）</div>
          <textarea class="form-textarea" id="bk-remark" placeholder="如有特殊需求请备注…" oninput="window.__bookingState.remark=this.value"></textarea>
        </div>
        <div class="booking-summary" id="bookingSummary">
          <div class="summary-title">📋 预约信息</div>
          <div class="summary-row"><span>门店</span><span id="sum-store">${store.name}</span></div>
          ${selectedTech ? `<div class="summary-row"><span>技师</span><span>${selectedTech.name}</span></div>` : ''}

        </div>

    document.getElementById('sum-store').textContent = s.name;

    window.__bookingState.svc = svcList[0] || null;
    renderSvcList(svcList, svcList[0]);
  };
  
  window.onBkTimeChange = function(time) {
    window.__bookingState.time = time;
    document.getElementById('sum-time').textContent = time;
  };
  
  window.selectDate = function(date, el) {
    window.__bookingState.date = date;
    document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    const d = dates.find(x => x.date === date);
    if (d) document.getElementById('sum-date').textContent = d.week + ' ' + d.day + '日';
  };
  
  window.selectSvc = function(svcId) {
    const storeId = window.__bookingState.storeId;
    const s = stores.find(x => x.id == storeId);
    const svcList = getServicesByStoreName(s.name);
    const svc = svcList.find(x => x.id === svcId);
    window.__bookingState.svc = svc;
    document.getElementById('sum-svc').textContent = svc ? svc.name + ' ¥' + svc.price : '未选择';
    renderSvcList(svcList, svc);

  window.renderSvcList = function(svcList, selected) {

  window.doBooking = function() {

    if (!name) { alert('请输入姓名'); return; }
    if (!/^1\d{10}$/.test(phone)) { alert('请输入正确的手机号'); return; }
    if (!st.svc) { alert('请选择服务'); return; }
    const store = stores.find(s => s.id == st.storeId);
    const tech = st.techId ? technicians.find(t => t.id == st.techId) : null;
    const date = dates.find(d => d.date === st.date);
    const summary = `

日期：${date ? date.week + ' ' + date.day + '日' : '?'}
时间：${st.time} 到店
预约人：${name}
电话：${phone}
━━━━━━━━━━━━━━━━
我们将尽快确认您的预约，请保持电话畅通！
预约电话：${store ? store.phone : '?'}

window.showToast = function(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
};

// ─── BOOT ──────────────────────────────────────────────
window.navigate = navigate;
window.goBack = goBack;

function updateNavForHash() {
  var items = document.querySelectorAll('.nav-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var path = (window.location.hash.slice(1) || 'home').split('?')[0];
  var map = {
    'home':'nav-home','services':'nav-services','booking':'nav-booking',
    'stores':'nav-stores','member':'nav-member'
  };
  var el = document.getElementById(map[path]);
  if (el) el.classList.add('active');
}

function bootApp(data) {
  window.__APP_DATA__ = data;
  document.getElementById('navBar').style.display = 'flex';
  window.location.hash = window.location.hash || 'home';
  updateNavForHash();
  render();
  window.addEventListener('hashchange', function() { updateNavForHash(); render(); });
}

// Boot: if inline data already loaded (from inline-data.js), use it
if (window.__APP_DATA__) {
  bootApp(window.__APP_DATA__);
} else {
  // Try fetch first (server environment)
  fetch('data.json')
    .then(function(r) { return r.json(); })
    .then(bootApp)
    .catch(function(err) {
      // Show error with server instructions
      console.error('Load error:', err);
